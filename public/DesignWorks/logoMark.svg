<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#9f1239"/>
  <!-- Pen nib representing design work -->
  <!-- nib body -->
  <path d="M256 96 L380 220 L256 430 L132 220 Z" fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>
  <!-- nib center slit -->
  <line x1="256" y1="280" x2="256" y2="430" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <!-- nib top flat -->
  <line x1="188" y1="162" x2="324" y2="162" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <!-- ink dot at tip -->
  <circle cx="256" cy="430" r="18" fill="white"/>
</svg>
